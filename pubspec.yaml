name: cookmyfridge
description: Turn leftovers into delicious meals with AI-powered recipes.
publish_to: 'none'
version: 3.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Networking & API
  http: ^1.2.0

  # State management
  provider: ^6.1.1

  # UI
  google_fonts: ^8.1.0
  flutter_animate: ^4.3.0
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1

  # Sharing
  share_plus: ^13.1.0
  url_launcher: ^6.2.4

  # Firebase (Phase 2)
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_messaging: ^16.3.0
  firebase_analytics: ^12.4.2
  firebase_storage: ^13.4.2
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0
  flutter_local_notifications: ^21.0.0
  flutter_secure_storage: ^10.3.1

  # Phase 3 — Monetization
 
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app_icon.png
  min_sdk_android: 21
