name: cookmyfridge
description: Turn leftovers into delicious meals with AI-powered recipes.
publish_to: 'none'
version: 3.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Networking & API
  http: ^1.2.0

  # State management
  provider: ^6.1.1

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1

  # Sharing
  share_plus: ^7.2.1
  url_launcher: ^6.2.4

  # Firebase (Phase 2)
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_messaging: ^14.7.19
  firebase_analytics: ^10.8.9
  firebase_storage: ^11.6.9
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  flutter_local_notifications: ^17.0.0
  flutter_secure_storage: ^9.0.0

  # Phase 3 — Monetization
  google_mobile_ads: ^5.1.0        # Google AdMob
  in_app_purchase: ^3.1.13         # Play Store subscriptions
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
